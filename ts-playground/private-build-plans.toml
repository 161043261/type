[buildPlans.Iosevka]
family = "Iosevka"
spacing = "fontconfig-mono"
serifs = "sans"
noCvSs = true
exportGlyphNames = false

  [buildPlans.Iosevka.variants]
  inherits = "ss06"

    [buildPlans.Iosevka.variants.design]
    two = "straight-neck-serifless"
    capital-g = "toothed-serifless-hookless"
    capital-j = "serifless"
    capital-q = "crossing"
    i = "serifed-flat-tailed"
    j = "serifless"
    tittle = "round"
    diacritic-dot = "round"
    punctuation-dot = "round"
    at = "compact"
    lig-ltgteq = "slanted"

  [buildPlans.Iosevka.ligations]
  inherits = "javascript"

[buildPlans.Iosevka.weights.Light]
shape = 300
menu = 300
css = 300

[buildPlans.Iosevka.weights.Regular]
shape = 400
menu = 400
css = 400

[buildPlans.Iosevka.weights.Medium]
shape = 500
menu = 500
css = 500

[buildPlans.Iosevka.weights.SemiBold]
shape = 600
menu = 600
css = 600

[buildPlans.Iosevka.weights.Bold]
shape = 700
menu = 700
css = 700

[buildPlans.Iosevka.widths.Normal]
shape = 500
menu = 5
css = "normal"

[buildPlans.Iosevka.slopes.Upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.Iosevka.slopes.Italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
