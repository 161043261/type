<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        font-family: "Hack", "Fira Code", "Menlo", "PingFang SC",
          "Microsoft YaHei", monospace;
        font-size: 16px;
        margin: 0;
        padding: 0;
        border: none;
      }

      a {
        text-decoration: none;
      }

      ul {
        list-style: none;
      }

      html,
      body {
        background-image: url("../assets/image-800w.jpg");
        background-size: cover;
        background-repeat: no-repeat;
      }

      .page-header {
        height: 80px;
        background-color: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 20px;
      }

      .header-nav {
        display: flex;
      }

      .header-nav li a {
        color: white;
        font-size: 20px;
        border: 1px solid white;
        border-radius: 10px;
        padding: 10px;
        margin-right: 20px;
      }

      .header-nav li:last-child a {
        margin-right: 0;
      }

      .page-content {
        display: flex;
        height: calc(100vh - 80px);
      }

      .content-nav {
        width: 1200px;
        height: 300px;
        background-color: lightblue;
        /* 水平垂直居中: 父元素开启 flex 布局, 子元素使用 margin: auto */
        margin: auto;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
      }

      .content-nav .item {
        width: 180px;
        height: 200px;
        display: flex;
        /* 主轴默认压缩, 侧轴默认拉伸 */

        /* 主轴默认对齐方式
      主轴起点对齐 (整体左对齐) */
        flex-direction: column;
        /* 侧轴默认对齐方式
      单行: 如果没有指定高度, 则拉伸以填充整行
      多行: 如果没有指定高度, 则拉伸以填充整个侧轴 */

        /* center 侧轴中点对齐 (整体垂直居中 ) */
        align-items: center;
        /* space-evenly: 主轴均匀分布: 两端距离等于中间距离 */
        justify-content: space-evenly;
        /* 过渡 */
        transition: 0.5s linear;
        cursor: pointer;
      }

      .content-nav .item:hover {
        /* 偏移 0 0, 模糊值 20px */
        box-shadow: 0 0 20px gray;
      }

      .content-nav .item span {
        font-size: 20px;
        color: white;
      }

      .content-nav .item:nth-child(even) {
        background-color: lightpink;
      }

      .content-nav .item:nth-child(odd) {
        background-color: lightgreen;
      }
    </style>
  </head>

  <body>
    <!-- 头部 -->
    <header class="page-header">
      <a href="#">
        <img src="../assets/ganyu.webp" alt="logo" height="50px" />
      </a>
      <ul class="header-nav">
        <li><a href="#">流天射术</a></li>
        <li><a href="#">山泽麟迹</a></li>
        <li><a href="#">降众天华</a></li>
        <li><a href="#">唯此一心</a></li>
        <li><a href="#">天地交泰</a></li>
        <li><a href="#">藏弓待用</a></li>
      </ul>
    </header>
    <!-- 内容区 -->
    <div class="page-content">
      <div class="content-nav">
        <div class="item">
          <img src="../assets/ganyu.webp" alt="ganyu" width="100px" />
          <span>命之座: 饮露</span>
        </div>
        <div class="item">
          <img src="../assets/ganyu.webp" alt="ganyu" width="100px" />
          <span>命之座: 获麟</span>
        </div>
        <div class="item">
          <img src="../assets/ganyu.webp" alt="ganyu" width="100px" />
          <span>命之座: 云行</span>
        </div>
        <div class="item">
          <img src="../assets/ganyu.webp" alt="ganyu" width="100px" />
          <span>命之座: 西狩</span>
        </div>
        <div class="item">
          <img src="../assets/ganyu.webp" alt="ganyu" width="100px" />
          <span>命之座: 折草</span>
        </div>
        <div class="item">
          <img src="../assets/ganyu.webp" alt="ganyu" width="100px" />
          <span>命之座: 履虫</span>
        </div>
      </div>
    </div>
  </body>
</html>
